services:
  watchtower:
    image: storjlabs/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 30
      WATCHTOWER_CLEANUP: "true"
    restart: unless-stopped
    networks:
      - mv2img-network

networks:
  mv2img-network:
    driver: bridge
